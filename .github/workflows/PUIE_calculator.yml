name: Calculate Priority from Labels
on:
  issues:
    types: [opened, edited, labeled, unlabeled]
jobs:
  calculate-priority:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Math from Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueLabels = context.payload.issue.labels.map(l => l.name);

            const getVal = (prefix) => {
              const label = issueLabels.find(l => l.startsWith(prefix));
              return label ? parseFloat(label.split(':')[1]) : null;
            };

            const impact = getVal('importance:');
            const urgency = getVal('urgency:');
            const effort = getVal('effort:');

            if (impact !== null && urgency !== null && effort !== null && effort !== 0) {
              const score = ((impact * urgency) / effort).toFixed(2);

              // Remove existing priority labels
              const allLabels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              for (const l of allLabels.data) {
                if (l.name.startsWith('priority:')) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: l.name
                  });
                }
              }

              // Create the label if it doesn't exist
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: "priority: " + score,
                  color: "0075ca"
                });
              } catch (e) {
                if (e.status !== 422) throw e;
              }

              // Add the new priority label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ["priority: " + score]
              });
            }