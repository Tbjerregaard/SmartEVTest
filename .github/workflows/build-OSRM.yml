name: build-osrm

on:
  push:
    branches: [ main ]
    paths:
      - output.osm.pbf
      - Dockerfile.osrm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache LFS object
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('output.osm.pbf') }}
          restore-keys: lfs-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.osrm
          push: true
          tags: |
            ghcr.io/tbjerregaard/osrm_builder:latest
            ghcr.io/tbjerregaard/osrm_builder:${{ hashFiles('output.osm.pbf') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max