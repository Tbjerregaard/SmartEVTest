name: Auto-Prioritise Issues
run-name: "PUIE: Manual run"

on:
  workflow_dispatch:

# Field names as they appear in the project board.
# Update these if the fields are renamed in the project.
env:
  URGENCY_FIELD:  'Urgency'
  IMPACT_FIELD:   'Impact'
  EFFORT_FIELD:   'Effort'
  PRIORITY_FIELD: 'Priority'

jobs:
  prioritise:
    runs-on: ubuntu-latest

    steps:
      - name: Calculate and write Priority field
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const PROJECT_NUMBER = parseInt('${{ vars.PROJECT_NUMBER }}');
            const ORG            = context.repo.owner;

            // 0. Validate PROJECT_NUMBER
            if (!PROJECT_NUMBER || isNaN(PROJECT_NUMBER)) {
              core.setFailed(
                'PROJECT_NUMBER variable is missing or not a valid number. ' +
                'Set it under Settings → Secrets and variables → Actions → Variables.'
              );
              return;
            }

            // 1. Resolve project ID and field IDs
            const { organization } = await github.graphql(`
              query($org: String!, $num: Int!) {
                organization(login: $org) {
                  projectV2(number: $num) {
                    id
                    fields(first: 30) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                          dataType
                        }
                      }
                    }
                  }
                }
              }
            `, { org: ORG, num: PROJECT_NUMBER });

            const project   = organization.projectV2;
            const projectId = project.id;

            const findField = name =>
              project.fields.nodes.find(
                f => f.name?.toLowerCase() === name.toLowerCase()
              );

            const urgencyField  = findField(process.env.URGENCY_FIELD);
            const impactField   = findField(process.env.IMPACT_FIELD);
            const effortField   = findField(process.env.EFFORT_FIELD);
            const priorityField = findField(process.env.PRIORITY_FIELD);

            if (!urgencyField || !impactField || !effortField || !priorityField) {
              const found = project.fields.nodes.map(f => f.name).join(', ');
              core.setFailed(
                `Missing required project fields.\n` +
                `Expected: ${process.env.URGENCY_FIELD}, ${process.env.IMPACT_FIELD}, ${process.env.EFFORT_FIELD}, ${process.env.PRIORITY_FIELD}\n` +
                `Found:    ${found}`
              );
              return;
            }

            // 2. Fetch all issue items in the project
            let itemsToProcess = [];
            let cursor = null;

            do {
              const result = await github.graphql(`
                query($projectId: ID!, $cursor: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { __typename }
                        }
                      }
                    }
                  }
                }
              `, { projectId, cursor });

              const page = result.node.items;
              itemsToProcess.push(
                ...page.nodes
                  .filter(n => n.content?.__typename === 'Issue')
                  .map(n => n.id)
              );
              cursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
            } while (cursor);

            core.info(`Found ${itemsToProcess.length} issue item(s) to process.`);

            // 3. Calculate and write Priority for each item
            for (const projectItemId of itemsToProcess) {
              const { node: item } = await github.graphql(`
                query($id: ID!) {
                  node(id: $id) {
                    ... on ProjectV2Item {
                      content {
                        ... on Issue { number title }
                      }
                      fieldValues(first: 30) {
                        nodes {
                          ... on ProjectV2ItemFieldNumberValue {
                            field { ... on ProjectV2Field { id } }
                            number
                          }
                        }
                      }
                    }
                  }
                }
              `, { id: projectItemId });

              const issueRef = item.content?.number
                ? `#${item.content.number} "${item.content.title}"`
                : projectItemId;

              const getNum = (fieldId) =>
                item.fieldValues.nodes.find(v => v.field?.id === fieldId)?.number ?? null;

              const urgency = getNum(urgencyField.id);
              const impact  = getNum(impactField.id);
              const effort  = getNum(effortField.id);

              if ([urgency, impact, effort].some(v => v === null)) {
                core.info(`Issue ${issueRef}: skipping — Urgency=${urgency}  Impact=${impact}  Effort=${effort}`);
                continue;
              }

              if (effort === 0) {
                core.warning(`Issue ${issueRef}: Effort is zero — division by zero, skipping.`);
                continue;
              }

              const rounded = Math.round((urgency * impact / effort) * 100) / 100;

              core.info(`Issue ${issueRef}: P = (${urgency} * ${impact}) / ${effort} = ${rounded}`);

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId:    $itemId
                    fieldId:   $fieldId
                    value:     { number: $value }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, { projectId, itemId: projectItemId, fieldId: priorityField.id, value: rounded });

              core.info(`Issue ${issueRef}: Priority set to ${rounded}`);
            }