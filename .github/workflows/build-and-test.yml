name: build-and-test

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Cache LFS object
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('output.osm.pbf') }}
          restore-keys: lfs-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: smartev-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: docker run smartev-test dotnet test